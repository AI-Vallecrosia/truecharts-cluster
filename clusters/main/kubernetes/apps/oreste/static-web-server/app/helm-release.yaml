---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: freeports-static-web-server
  namespace: static-web-server
spec:
  interval: 15m
  chart:
    spec:
      chart: static-web-server
      version: 8.5.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: enabled
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    persistence:
      config:
        type: nfs
        path: /mnt/AI_SSD/Deployments/freeports/www
        server: "10.0.10.10"
    ingress:
      main:
        ingressClassName: external
        enabled: true
        hosts:
        - host: www.freeports.aivallecrosia.com
        - host: www.freeports.org
         


