---
apiVersion: v1
kind: Secret
metadata:
  namespace: wordpress-guests
  name: wordpress-don-mariadb-data-volsync-config
type: Opaque
stringData:
  # The repository url
  RESTIC_REPOSITORY: s3:${S3_ENDPOINT}/${S3_BUCKET}/wordpress-don/volsync/mariadb-data
  # The repository encryption key
  RESTIC_PASSWORD: ${S3_KEY}
  # ENV vars specific to the chosen back end
  # https://restic.readthedocs.io/en/stable/030_preparing_a_new_repo.html
  AWS_ACCESS_KEY_ID: ${S3_ID}
  AWS_SECRET_ACCESS_KEY: ${S3_KEY}