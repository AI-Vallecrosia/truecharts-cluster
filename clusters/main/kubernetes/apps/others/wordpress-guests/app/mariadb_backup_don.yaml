---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  labels:
    app.kubernetes.io/instance: wordpress-don
    app.kubernetes.io/name: wordpress-don
    release: wordpress-don
  name: wordpress-don-mariadb-data-data-src
  namespace: wordpress-guests
spec:
  restic:
    accessModes:
    - ReadWriteOnce
    cacheCapacity: 10Gi
    copyMethod: Snapshot
    moverSecurityContext:
      fsGroup: 568
      runAsGroup: 0
      runAsUser: 568
    pruneIntervalDays: 7
    repository: wordpress-don-mariadb-data-volsync-config
    retain:
      daily: 5
      hourly: 5
      monthly: 1
      weekly: 1
      yearly: 1
    unlock: "20260618111026"
  sourcePVC: wordpress-don-mariadb-data
  trigger:
    schedule: "11 10 * * *"
